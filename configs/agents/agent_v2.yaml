mutation_rationale: The new behavioral guideline provides a specific de-escalation
  tactic for immediate hostility, addressing the goal completion failure with angry
  personas. The added conversation style rule explicitly instructs the agent to terminate
  the call after a goodbye, which will prevent the repetitive closing loop that degraded
  conversational quality.
